title: Checkout Flow
description: Complete e-commerce checkout journey from cart to confirmation
tags: [flow, checkout, ecommerce, purchase]
status: stable
category: flows
order: 2

steps:
  - id: cart
    title: Shopping Cart
    description: Review items in cart before checkout
    screen: cart

  - id: shipping
    title: Shipping Information
    description: Enter shipping address and select delivery method
    screen: login

  - id: payment
    title: Payment Details
    description: Enter payment information securely
    screen: login

  - id: review
    title: Order Review
    description: Final review before placing order
    screen: cart

  - id: confirmation
    title: Order Confirmed
    description: Purchase complete, order confirmation displayed
    screen: checkout-success

transitions:
  - from: cart
    to: shipping
    trigger: click_checkout

  - from: shipping
    to: payment
    trigger: submit_address

  - from: payment
    to: review
    trigger: submit_payment

  - from: review
    to: confirmation
    trigger: place_order
