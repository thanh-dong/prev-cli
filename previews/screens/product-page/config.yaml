kind: screen
id: product-page
title: E-Commerce Product Page
schemaVersion: "2.0"

states:
  default: { description: "Product available, ready to add to cart" }
  loading: { description: "Adding to cart in progress" }
  added: { description: "Successfully added to cart" }
  out-of-stock: { description: "Product unavailable" }

template:
  root:
    type: $col(gap:lg padding:lg)
    children:
      # Breadcrumb header
      header:
        type: $row(gap:sm)
        children:
          home: $text("Home" color:muted-foreground)
          sep1: $text("/" color:muted-foreground)
          category: $text("Electronics" color:muted-foreground)
          sep2: $text("/" color:muted-foreground)
          current: $text("Wireless Headphones" color:primary)

      # Main product content
      main:
        type: $row(gap:xl)
        children:
          # Left: Image gallery
          gallery:
            type: $col(gap:sm)
            children:
              main-image:
                type: $box(bg:muted radius:lg padding:lg)
                children:
                  image: $image(src:"https://picsum.photos/400/400" alt:"Product Image" fit:contain)
              thumbnails:
                type: $row(gap:xs)
                children:
                  thumb1:
                    type: $box(bg:muted radius:sm padding:sm)
                    children:
                      img1: $image(src:"https://picsum.photos/80/80?1" alt:"Thumbnail 1")
                  thumb2:
                    type: $box(bg:muted radius:sm padding:sm)
                    children:
                      img2: $image(src:"https://picsum.photos/80/80?2" alt:"Thumbnail 2")
                  thumb3:
                    type: $box(bg:muted radius:sm padding:sm)
                    children:
                      img3: $image(src:"https://picsum.photos/80/80?3" alt:"Thumbnail 3")

          # Right: Product details
          details:
            type: $col(gap:lg)
            children:
              # Title and rating
              title-section:
                type: $col(gap:xs)
                children:
                  title: $text("Premium Wireless Headphones" size:xl weight:bold)
                  rating:
                    type: $row(gap:xs)
                    children:
                      star1: $icon(star size:sm color:primary)
                      star2: $icon(star size:sm color:primary)
                      star3: $icon(star size:sm color:primary)
                      star4: $icon(star size:sm color:primary)
                      star5: $icon(star-half size:sm color:muted)
                      reviews: $text("(128 reviews)" size:sm color:muted)

              # Price section
              price-section:
                type: $row(gap:md)
                children:
                  price: $text("$299.00" size:xl weight:bold color:primary)
                  original:
                    type: $col
                    children:
                      was: $text("Was $399.00" size:sm color:muted)

              # Description
              description:
                type: $col(gap:sm)
                children:
                  desc-title: $text("Description" size:md weight:medium)
                  desc-text: $text("Experience premium sound quality with active noise cancellation. 30-hour battery life, comfortable over-ear design, and seamless Bluetooth 5.0 connectivity." color:muted)

              # Features list
              features:
                type: $col(gap:xs)
                children:
                  feat-title: $text("Key Features" size:md weight:medium)
                  feat1:
                    type: $row(gap:sm)
                    children:
                      check1: $icon(check size:sm color:success)
                      label1: $text("Active Noise Cancellation")
                  feat2:
                    type: $row(gap:sm)
                    children:
                      check2: $icon(check size:sm color:success)
                      label2: $text("30-hour Battery Life")
                  feat3:
                    type: $row(gap:sm)
                    children:
                      check3: $icon(check size:sm color:success)
                      label3: $text("Bluetooth 5.0")
                  feat4:
                    type: $row(gap:sm)
                    children:
                      check4: $icon(check size:sm color:success)
                      label4: $text("Premium Comfort Fit")

              # Action area (state-dependent)
              actions: $slot(actions)

      # Footer: Related products
      related:
        type: $col(gap:md)
        children:
          related-title: $text("You May Also Like" size:lg weight:bold)
          related-grid:
            type: $row(gap:md)
            children:
              related1:
                type: $box(bg:surface radius:md padding:md)
                children:
                  r1-content:
                    type: $col(gap:sm)
                    children:
                      r1-img: $image(src:"https://picsum.photos/150/150?r1" alt:"Related 1")
                      r1-name: $text("Earbuds Pro" size:sm weight:medium)
                      r1-price: $text("$149.00" size:sm color:primary)
              related2:
                type: $box(bg:surface radius:md padding:md)
                children:
                  r2-content:
                    type: $col(gap:sm)
                    children:
                      r2-img: $image(src:"https://picsum.photos/150/150?r2" alt:"Related 2")
                      r2-name: $text("Speaker Mini" size:sm weight:medium)
                      r2-price: $text("$79.00" size:sm color:primary)
              related3:
                type: $box(bg:surface radius:md padding:md)
                children:
                  r3-content:
                    type: $col(gap:sm)
                    children:
                      r3-img: $image(src:"https://picsum.photos/150/150?r3" alt:"Related 3")
                      r3-name: $text("Headphone Stand" size:sm weight:medium)
                      r3-price: $text("$29.00" size:sm color:primary)

slots:
  actions:
    default: $box(bg:accent radius:md padding:md)
    loading: $text("Adding to cart..." color:muted)
    added: $text("Added to cart!" color:success weight:bold)
    out-of-stock: $text("Out of Stock - Notify Me" color:error)
