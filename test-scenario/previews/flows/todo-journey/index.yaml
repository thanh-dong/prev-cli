name: Todo Journey
description: A user's journey from an empty list to completing all tasks
steps:
  - screen: todo
    title: Empty State
    description: User opens the app for the first time
    state: empty
    trigger: Launch app
  - screen: todo
    title: First Todos
    description: User adds their first few tasks
    trigger: Type and press Add
  - screen: todo
    title: Growing List
    description: The list grows as the user adds more tasks
    state: many-items
    trigger: Keep adding items
  - screen: todo
    title: All Complete
    description: User checks off every task
    state: all-done
    trigger: Check off remaining items
