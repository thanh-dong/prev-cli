name: App Information Architecture
description: Navigation structure for the main application
hierarchy:
  root: home
  areas:
    home:
      title: Home
      description: Landing page and main dashboard
      children: [auth, products]
    auth:
      title: Authentication
      description: Login and registration flows
      parent: home
      children: [login, register]
    login:
      title: Login
      description: User sign-in page
      parent: auth
    register:
      title: Register
      description: New user registration
      parent: auth
    products:
      title: Products
      description: Product catalog and details
      parent: home
      children: [catalog, detail]
    catalog:
      title: Catalog
      description: Browse all products
      parent: products
    detail:
      title: Product Detail
      description: Individual product page
      parent: products
relationships:
  - from: login
    to: home
    type: redirect-on-success
  - from: register
    to: login
    type: redirect-on-success
